name: aromatic
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_acrylic: ^1.1.4
  shared_preferences: ^2.3.0
  flutter_markdown_plus: ^1.0.7
  uuid: ^4.5.1
  http: ^1.2.0
  msix: ^3.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/prompts/zh/
    - assets/prompts/en/
    - assets/l10n/zh.json
    - assets/l10n/en.json
    - assets/icon/app_icon.png

flutter_launcher_icons:
  android:
    image_path: "assets/icon/app_icon.png"
  ios:
    image_path: "assets/icon/app_icon.png"
  windows:
    image_path: "assets/icon/app_icon.png"